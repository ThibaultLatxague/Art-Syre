@if(utilisateurCourant != null && utilisateurCourant.estAdmin){

<div class="admin-page">

    <header class="admin-header">
        <h1>Administration</h1>
        <p>Gestion globale de la plateforme</p>
    </header>

    <div class="admin-grid">

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/administration/tableaux'">
                <mat-card-header>
                    <mat-card-title>Tableaux</mat-card-title>
                    <mat-card-subtitle>Gérer les œuvres (ajout, modification, suppression)</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/administration/utilisateurs'">
                <mat-card-header>
                    <mat-card-title>Utilisateurs</mat-card-title>
                    <mat-card-subtitle>Gestion des comptes et permissions</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/securite'">
                <mat-card-header>
                    <mat-card-title>Sécurité</mat-card-title>
                    <mat-card-subtitle>Paramètres et protection des données</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/seo'">
                <mat-card-header>
                    <mat-card-title>SEO</mat-card-title>
                    <mat-card-subtitle>Référencement et visibilité Google</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/logs'">
                <mat-card-header>
                    <mat-card-title>Logs</mat-card-title>
                    <mat-card-subtitle>Erreurs et activité serveur</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

        <mat-card class="admin-card" appearance="outlined">
            <button mat-button [routerLink]="'/statistiques'">
                <mat-card-header>
                    <mat-card-title>Statistiques</mat-card-title>
                    <mat-card-subtitle>Performance et trafic</mat-card-subtitle>
                </mat-card-header>
            </button>
        </mat-card>

    </div>
</div>

} @else {
<div class="empty-state">
    <p>Accès non autorisé</p>
</div>
}
