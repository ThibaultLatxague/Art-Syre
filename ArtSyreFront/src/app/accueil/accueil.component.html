<div class="gallery">

  <!-- <header class="gallery-header" *ngIf="utilisateurCourant?.prenom">
    <span class="gallery-greeting">Galerie privée · <em>{{ utilisateurCourant?.prenom }}</em></span>
  </header> -->

<div class="paint-splashes">
    <span class="paint-item stroke stroke-left-top" #paintingScene></span>
    <span class="paint-item stroke stroke-right-middle" #paintingScene></span>
    <span class="paint-item splash splash-left-bottom" #paintingScene></span>
    <span class="paint-item splash splash-right-top" #paintingScene></span>
    <span class="paint-item drip drip-left" #paintingScene></span>
    <span class="paint-item drip drip-right" #paintingScene></span>
    <span class="paint-item small-dot dot-one" #paintingScene></span>
    <span class="paint-item small-dot dot-two" #paintingScene></span>
</div>

  <section class="painting-scene"
           *ngFor="let tableau of dataSource; let i = index"
           #paintingScene>

    <div class="painting-wrapper">

      <div class="painting-frame"
           [class.frame--liked]="utilisateurCourant?.tableauxLikes?.includes(tableau.id)">

        <img class="painting-img"
             src="https://material.angular.dev/assets/img/examples/shiba2.jpg"
             [alt]="tableau.nom">

        <div class="painting-overlay">
          <button class="action-btn"
            [class.action-btn--active]="utilisateurCourant?.tableauxLikes?.includes(tableau.id)"
            (click)="toggleLike(tableau)"
            [attr.aria-label]="'Coup de cœur pour ' + tableau.nom"
            matTooltip="Coup de cœur">
            <mat-icon>{{ utilisateurCourant?.tableauxLikes?.includes(tableau.id) ? 'favorite' : 'favorite_border' }}</mat-icon>
          </button>

          <button class="action-btn action-btn--cart"
            [class.action-btn--active]="utilisateurCourant?.tableauxDansPanier?.includes(tableau.id)"
            (click)="toggleCart(tableau)"
            [attr.aria-label]="'Acquérir ' + tableau.nom"
            matTooltip="Acquérir cette œuvre">
            <mat-icon>{{ utilisateurCourant?.tableauxDansPanier?.includes(tableau.id) ? 'shopping_bag' : 'add_shopping_cart' }}</mat-icon>
          </button>
        </div>

      </div>

      <div class="painting-caption">
        <span class="caption-num">{{ (i + 1).toString().padStart(2, '0') }}</span>
        <div class="caption-rule"></div>
        <div class="caption-body">
          <h2 class="caption-title">{{ tableau.nom }}</h2>
          <p class="caption-meta">{{ tableau.taille }} cm &nbsp;·&nbsp; {{ tableau.prix }} €</p>
        </div>
      </div>

    </div>

  </section>

</div>
